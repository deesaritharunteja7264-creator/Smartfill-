<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Fill</title>
  <style>
    /* General Reset */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }

    /* Header */
    header {
      background-color: rgb(255, 150, 180);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    header img {
      height: 60px;
    }

    .menu-btn {
      border: none;
      background: none;
      font-size: 28px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Main Content */
    main {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    #preview {
      width: 100%;
      height: 300px;
      resize: none;
      padding: 10px;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #0056b3;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }

    /* Overlay + Dialog */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }

    #overlay.show {
      display: block;
    }

    #mydialog {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      min-width: 220px;
      text-align: center;
    }

    #mydialog.show {
      display: block;
    }

    #mydialog button {
      background: none;
      color: #333;
      font-size: 16px;
      padding: 8px 0;
      width: 100%;
    }

    #mydialog button:hover {
      background-color: #f0f0f0;
    }

    /* =========================
       Responsive Design
    ==========================*/

    /* Tablets */
    @media (max-width: 768px) {
      header {
        padding: 8px 15px;
      }

      header img {
        height: 50px;
      }

      .menu-btn {
        font-size: 24px;
      }

      #preview {
        height: 250px;
      }

      button {
        width: 48%;
      }
    }

    /* Mobile phones */
    @media (max-width: 480px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      header img {
        height: 45px;
        margin-bottom: 8px;
      }

      main {
        padding: 10px;
      }

      #preview {
        height: 200px;
        font-size: 13px;
      }

      .btn-group {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <img src="/smartfill/image-7.png" alt="Smart Fill Logo">
    <button class="menu-btn" id="details">☰</button>
  </header>

  <!-- Main Content -->
  <main>
    <textarea id="preview" placeholder="Text will appear here..."></textarea>

    <div class="btn-group">
      <div style="flex:1">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <button id="selbtn">Select Image</button>
        <button id="auto">Auto Fill</button>
      </div>
      <button id="next">Next</button>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Smart Fill</p>
  </footer>

  <!-- Overlay + Dialog -->
  <div id="overlay"></div>
  <div id="mydialog">
    <button>Save</button>
    <button>Save As</button>
    <button>Help</button>
    <button id="closeDialog">Close</button>
  </div>

  <script>
    const dialog = document.getElementById("mydialog");
    const overlay = document.getElementById("overlay");
    const detailsBtn = document.getElementById("details");
    const closeDialogBtn = document.getElementById("closeDialog");

    // Open dialog
    detailsBtn.addEventListener("click", () => {
      dialog.classList.add("show");
      overlay.classList.add("show");
    });

    // Close dialog
    function closeDialog() {
      dialog.classList.remove("show");
      overlay.classList.remove("show");
    }

    overlay.addEventListener("click", closeDialog);
    closeDialogBtn.addEventListener("click", closeDialog);

    // Select Image trigger
      document.getElementById("selbtn").addEventListener("click", () => {
      document.getElementById("fileInput").click();
    });

    // Next page
    document.getElementById("next").addEventListener("click", () => {
      window.location.href = "page2.html";
    });
    const upload = document.getElementById('fileInput');
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
   // const newText = document.getElementById('newText');
    
    let img = new Image();
    let clickX = 50, clickY = 50; // Default position
    
    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      clickX = e.clientX - rect.left;
      clickY = e.clientY - rect.top;
    });
  </script>
</body>
</html>
